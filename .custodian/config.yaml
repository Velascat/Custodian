repo_key: Custodian
src_root: src
tests_root: tests

# Custodian audits itself with its own generic C1-C8 baseline. Eating
# our own dog food: if a pattern is bad enough to flag in consumer
# repos, it should be flagged here too.

audit:
  # Terms used as documentation vocabulary (category labels, config key names)
  # that are not Python class/function names — suppress K1/K2 false positives.
  common_words:
    - custodian_hygiene
    - custodian_policy
    - forbidden_import_prefix
    - forbidden_import
    - max_lines
    - max_classes
    - max_functions
    - class_field_count
    - vulture_advisory
    - write_text

  known_values:
    - custodian_hygiene
    - custodian_policy

  # C1/C6: code_health.py contains "TODO" and "FIXME" as regex string literals
  # inside the detector patterns — not actual debt markers.
  # C2: audit.py is a CLI entrypoint that legitimately writes to stdout.
  # C7: test_code_health_detectors.py has `assert True` as the test fixture
  #     for C7 itself, and sample_consumer/tests/ is the test fixture repo.
  exclude_paths:
    C1:
      # code_health.py contains "TODO" as regex pattern strings — not debt markers.
      - src/custodian/audit_kit/code_health.py
      # ghost.py TODO markers are active development (detector under construction).
      # symbol_index.py TODO is a known gap tracked in backlog.
      - src/custodian/audit_kit/detectors/ghost.py
      - src/custodian/audit_kit/passes/symbol_index.py
    C6:
      # code_health.py contains "FIXME" as regex pattern strings — not debt markers.
      - src/custodian/audit_kit/code_health.py
      # ghost.py FIXME markers are active development — not stale.
      - src/custodian/audit_kit/detectors/ghost.py
    C10:
      # code_health.py mentions datetime.now() / utcnow() in the C10 detector's
      # docstring and regex — not actual naive datetime calls.
      - src/custodian/audit_kit/code_health.py
    C2:
      - src/custodian/cli/audit.py
      - src/custodian/cli/doctor.py
      - src/custodian/cli/multi.py
    C7:
      - tests/test_code_health_detectors.py
      - tests/fixtures/**
    C9:
      # CLI tools (doctor, multi) catch load/audit errors and surface them in
      # their human-readable output — the exception message IS captured;
      # no logger infrastructure is needed in CLI entry points.
      - src/custodian/cli/doctor.py
      - src/custodian/cli/multi.py
    C15:
      # code_health.py uses logger.info(f"...") as an example in the C15
      # docstring — not an actual logger call.
      - src/custodian/audit_kit/code_health.py
    C16:
      # code_health.py mentions Path.read_text() and Path.write_text() in the
      # C16 docstring — not actual pathlib calls.
      - src/custodian/audit_kit/code_health.py
    C17:
      # code_health.py contains len(x) == 0 / len(x) > 0 as regex pattern
      # strings in the C17 detector docstring — not actual comparisons.
      - src/custodian/audit_kit/code_health.py
    C18:
      # code_health.py uses f"plain text" as an example in the C18 docstring.
      - src/custodian/audit_kit/code_health.py
    C29:
      # These files are large by design — they're the core detector registries.
      # code_health.py houses all C-class detectors; dead_code.py houses all
      # D/F-class detectors. structure.py houses A1/S1-S4/H1 — all architecture
      # detectors in one coherent module. Splitting them would fracture the registry.
      - src/custodian/audit_kit/code_health.py
      - src/custodian/audit_kit/detectors/dead_code.py
      - src/custodian/audit_kit/detectors/structure.py
    C13:
      # CLI tools set os.environ["NO_COLOR"] to disable terminal colour in
      # subprocess output — this is terminal-formatting control, not config
      # access. Custodian itself has no centralised config layer.
      - "src/custodian/**/*.py"
    P1:
      # These builder functions intentionally return [] — the module docstring
      # explains the class was removed/superseded by ruff/ty adapter rules.
      - src/custodian/audit_kit/detectors/imports.py
      - src/custodian/audit_kit/detectors/annotations.py
      - src/custodian/audit_kit/detectors/complexity.py
    T1:
      # Detector functions (detect_cN, build_*_detectors) are tested
      # transitively through the CLI and integration test suite; they're
      # invoked via the detector registry, not called directly in tests.
      - src/custodian/audit_kit/code_health.py
      - src/custodian/audit_kit/detector.py
      - src/custodian/audit_kit/detectors/dead_code.py
      - src/custodian/audit_kit/detectors/directory.py
      - src/custodian/audit_kit/detectors/ghost.py
      - src/custodian/audit_kit/detectors/structure.py
      - src/custodian/audit_kit/detectors/stubs.py
      - src/custodian/audit_kit/detectors/test_shape.py
      - src/custodian/audit_kit/detectors/docs.py
      # CLI runner and report modules are tested through end-to-end CLI tests.
      - src/custodian/cli/runner.py
      - src/custodian/cli/report.py
      # CLI color helpers used by report; no direct unit tests needed.
      - src/custodian/cli/colors.py
      # Analysis passes (AST/call/import/symbol/tests) are exercised by all
      # detector tests that need graph data — not called directly in tests.
      - src/custodian/audit_kit/passes/ast_forest.py
      - src/custodian/audit_kit/passes/call_graph.py
      - src/custodian/audit_kit/passes/import_graph.py
      - src/custodian/audit_kit/passes/symbol_index.py
      - src/custodian/audit_kit/passes/tests_forest.py
      # Plugin protocols are implemented by OC/VF _custodian/ overlays, not tests.
      - src/custodian/plugins/protocols.py
      # SARIF report writer is an optional output format; tested through CLI integration.
      - src/custodian/reports/sarif_report.py

# Tool adapters — run external tools alongside AST-based detectors.
# Results appear in audit output with source: "adapter".
tools:
  ruff: true
  vulture: true
  # mypy: true          # enable when stubs / type annotations are in place
  # ty: true            # Astral's faster type-checker; enable when annotations land
  # semgrep: true       # requires rules/semgrep/ directory with .yaml rule files
